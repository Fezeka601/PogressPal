<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
</head>

<body><h1>Welcome, <span th:text="${username}"></span></h1>

<form action="/goals" method="post">
    <input type="text" name="title" placeholder="Enter goal" />
    <button type="submit">Add Goal</button>
</form>

<ul>
    <li th:each="goal : ${goals}" th:text="${goal.title}"></li>
</ul>
